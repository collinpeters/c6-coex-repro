[build]
target = "riscv32imac-unknown-none-elf"

[target.riscv32imac-unknown-none-elf]
runner = ["probe-rs", "run", "--chip", "esp32c6", "--log-format", "{t} [{L}] {s} ({f}:{l})"]
rustflags = [
    "-C", "link-arg=-Tlinkall.x",
    "-C", "link-arg=-Tdefmt.x",
    "-C", "force-frame-pointers",
]

[env]
DEFMT_LOG = "info"

[unstable]
build-std = ["core", "alloc"]
